url: https://leidenadvancedpkpd.github.io/amp.sim/
template:
  bootstrap: 5
  bslib:
    primary: '#FDA840'
    base_font:
      google:
        family: Source Sans Pro
        wght:
        - 400
        - 600
        ital:
        - 0
        - 1
    code_font:
      google: Source Code Pro
